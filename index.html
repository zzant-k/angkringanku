<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="Login admin dashboard Angkringan — sistem manajemen antrian dan menu">
    <title>Login — Angkringan Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page" id="auth-page">
    <div class="auth-card" role="main">

        <!-- Brand -->
        <div class="auth-brand">
            <div class="auth-logo" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <h1>AngkringanKu</h1>
            <p>Dashboard Angkringan</p>
        </div>

        <!-- Error message -->
        <div id="error-msg" class="error-msg hidden" role="alert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="error-text">Terjadi kesalahan.</span>
        </div>

        <!-- Form -->
        <form class="auth-form" id="login-form" novalidate>

            <div class="form-group">
                <label class="form-label" for="input-username">Username</label>
                <div style="position:relative;">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input
                        type="text"
                        id="input-username"
                        class="form-control"
                        placeholder="Masukkan username"
                        autocomplete="username"
                        autocapitalize="none"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="input-password">Password</label>
                <div style="position:relative;">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input
                        type="password"
                        id="input-password"
                        class="form-control"
                        placeholder="Masukkan password"
                        autocomplete="current-password"
                        required
                    >
                </div>
            </div>

            <button type="submit" id="btn-login" class="btn btn-primary btn-login">
                <span id="btn-login-text">Masuk</span>
                <span id="btn-login-spinner" class="spinner hidden"></span>
            </button>

        </form>

        <div class="auth-footer">
            &copy; 2026 Angkringan &mdash; Dashboard Admin
        </div>

    </div>
</div>

<script type="module">
    import { login, redirectIfAuth, getBaseUrl } from './js/auth.js';

    // Jika sudah login, langsung redirect
    redirectIfAuth();

    const form       = document.getElementById('login-form');
    const btnText    = document.getElementById('btn-login-text');
    const btnSpinner = document.getElementById('btn-login-spinner');
    const btnLogin   = document.getElementById('btn-login');
    const errorMsg   = document.getElementById('error-msg');
    const errorText  = document.getElementById('error-text');

    function setLoading(v) {
        btnLogin.disabled = v;
        btnText.classList.toggle('hidden', v);
        btnSpinner.classList.toggle('hidden', !v);
    }

    function showError(msg) {
        errorText.textContent = msg;
        errorMsg.classList.remove('hidden');
    }

    function hideError() {
        errorMsg.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const username = document.getElementById('input-username').value.trim();
        const password = document.getElementById('input-password').value;

        if (!username || !password) {
            showError('Username dan password wajib diisi.');
            return;
        }

        setLoading(true);
        try {
            await login(username, password);
            // Redirect ke dashboard setelah login berhasil
            window.location.href = getBaseUrl() + '/pages/dashboard.html';
        } catch (err) {
            showError(err.message || 'Login gagal. Periksa kembali kredensial Anda.');
        } finally {
            setLoading(false);
        }
    });

    // Enter di field username → fokus ke password
    document.getElementById('input-username').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('input-password').focus();
    });
</script>

</body>
</html>
